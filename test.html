<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click Test - DEBUG</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: Arial, sans-serif;
        padding: 50px;
        background: #f0f0f0;
      }
      
      .test-btn {
        background: #d4af37;
        color: white;
        padding: 20px 40px;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
        margin: 10px;
        display: inline-block;
      }
      
      .test-link {
        display: inline-block;
        background: #111;
        color: white;
        padding: 20px 40px;
        border-radius: 8px;
        text-decoration: none;
        margin: 10px;
        cursor: pointer;
      }
      
      .result {
        margin-top: 30px;
        padding: 20px;
        background: white;
        border-radius: 8px;
        min-height: 100px;
        font-size: 16px;
        line-height: 1.6;
      }
      
      .success {
        background: #90EE90 !important;
      }
      
      .info {
        background: #E0E0E0 !important;
      }
    </style>
  </head>
  <body>
    <h1>🔍 Click Test - Diagnostic Page</h1>
    <p><strong>This page tests if clicks work at all:</strong></p>

    <div style="margin: 30px 0;">
      <button class="test-btn" onclick="testClick('Button with onclick')">
        Test 1: Button with onclick
      </button>
      
      <button class="test-btn" id="testBtn2">
        Test 2: Button with addEventListener
      </button>
      
      <a href="tel:+919909270128" class="test-link">
        Test 3: Phone Link
      </a>
      
      <a href="#test" class="test-link" id="testLink">
        Test 4: Hash Link
      </a>
    </div>

    <div class="result info" id="result">
      Waiting for clicks... (Check console too - press F12)
    </div>

    <hr style="margin: 40px 0;" />

    <h2>Back to Main Site</h2>
    <a href="index.html" style="color: #d4af37; font-size: 18px;">
      ← Go to Main Site
    </a>

    <script>
      let clickCount = 0;
      const result = document.getElementById("result");

      // Test function
      function testClick(source) {
        clickCount++;
        result.className = "result success";
        result.innerHTML = `✅ <strong>SUCCESS!</strong><br>Click ${clickCount}: ${source} worked!<br><br>JavaScript is working correctly!`;
        console.log(`✅ Click ${clickCount}:`, source);
      }

      // Test addEventListener
      document.getElementById("testBtn2").addEventListener("click", function () {
        testClick("Button with addEventListener");
      });

      document.getElementById("testLink").addEventListener("click", function (e) {
        e.preventDefault();
        testClick("Hash Link with addEventListener");
      });

      // Global click listener
      document.addEventListener("click", function (e) {
        console.log("🖱️ Click detected on:", e.target);
      });

      // Initial log
      console.log("✅ Test page JavaScript loaded");
      result.innerHTML = `
        ℹ️ <strong>Ready!</strong><br>
        JavaScript is loaded. Click any button above to test.<br>
        <br>
        <small>Check browser console (F12) for detailed logs.</small>
      `;
    </script>
  </body>
</html>

    <hr style="margin: 40px 0" />

    <h2>Back to Main Site</h2>
    <a href="index.html" style="color: #d4af37">← Go to Main Site</a>

    <script>
      function showMessage(msg) {
        document.getElementById("result").textContent =
          msg + " - JavaScript is working!";
        document.getElementById("result").style.background = "#90EE90";
      }

      // Test if script loads
      console.log("Test page JavaScript loaded successfully");
      document.getElementById("result").textContent =
        "JavaScript loaded! Try clicking the buttons above.";
      document.getElementById("result").style.background = "#E0E0E0";
    </script>
  </body>
</html>
